```ini
[loggers]
keys=root,core,agents,communication,monitoring,framework,data,rpc

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=standardFormatter,detailedFormatter

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

# Core Orchestration Layer
[logger_core]
level=INFO
handlers=consoleHandler,fileHandler
qualname=src.core
propagate=0

[logger_agents]
level=INFO
handlers=consoleHandler,fileHandler
qualname=src.agents
propagate=0

# Communication Primitives
[logger_communication]
level=INFO
handlers=consoleHandler,fileHandler
qualname=src.communication
propagate=0

[logger_data]
level=INFO
handlers=consoleHandler,fileHandler
qualname=src.communication.shared_memory
propagate=0

[logger_rpc]
level=INFO
handlers=consoleHandler,fileHandler
qualname=src.communication.rpc_interface
propagate=0

# Monitoring & Observability
[logger_monitoring]
level=INFO
handlers=consoleHandler,fileHandler
qualname=src.monitoring
propagate=0

# General Framework-level logging (e.g., config loading, top-level errors)
[logger_framework]
level=INFO
handlers=consoleHandler,fileHandler
qualname=src.framework
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=standardFormatter
args=(sys.stderr,) # Log to stderr by default for console output

[handler_fileHandler]
class=logging.handlers.RotatingFileHandler
level=DEBUG
formatter=detailedFormatter
# Arguments: filename, mode, maxBytes, backupCount
# 10MB per file, keep 5 backup files (total 60MB log history)
args=('logs/multi_agent_orchestrator.log', 'a', 10485760, 5)
encoding=utf8

[formatter_standardFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_detailedFormatter]
format=%(asctime)s.%(msecs)03d - %(levelname)s - [%(process)d:%(thread)d] - %(name)s:%(lineno)d - %(funcName)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
```